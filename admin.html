<!DOCTYPE html>
<html lang="ar" dir="ltr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>لوحة التحكم | بيتزا لذة الملوك</title>
  <meta name="robots" content="noindex, nofollow">
  <meta name="theme-color" content="#1a1a2e">
  <link rel="icon" href="assets/icons/favicon.svg" type="image/svg+xml">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Cairo:wght@400;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/admin.css">
</head>
<body>

  <div id="toast-container" class="toast-container" aria-live="polite"></div>

  <!-- Header -->
  <header class="admin-header">
    <div class="header-brand">
      <img src="assets/logo/logo.svg" alt="Logo" class="header-logo" width="42" height="42" loading="lazy">
      <div>
        <h1>Menu Admin Panel</h1>
        <p class="header-sub">لوحة تحكم المنيو — بدون تعديل الكود</p>
      </div>
    </div>
    <div class="header-actions">
      <a href="index.html" class="btn btn-ghost" target="_blank">عرض الموقع</a>
      <button type="button" id="btn-import" class="btn btn-secondary">Import Menu</button>
      <button type="button" id="btn-reset" class="btn btn-warning">Reset Changes</button>
      <button type="button" id="btn-export-images" class="btn btn-secondary">Export Images List</button>
      <button type="button" id="btn-export" class="btn btn-primary btn-lg">Export Menu</button>
    </div>
  </header>

  <!-- Toolbar -->
  <div class="admin-toolbar">
    <div class="search-wrap">
      <svg class="search-icon" xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.3-4.3"/></svg>
      <input type="search" id="search-input" placeholder="Search food by name..." autocomplete="off">
    </div>
    <button type="button" id="btn-add-item" class="btn btn-success">
      <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" aria-hidden="true"><path d="M12 5v14M5 12h14"/></svg>
      Add New Item
    </button>
    <span id="autosave-status" class="autosave-status">Saved</span>
  </div>

  <!-- Main Layout -->
  <div class="admin-layout">
    <aside class="sidebar" id="sidebar">
      <h2 class="sidebar-title">Categories</h2>
      <nav id="category-list" class="category-list" aria-label="Menu categories"></nav>
    </aside>

    <main class="content-area">
      <div class="content-header">
        <h2 id="active-category-title">Select a category</h2>
        <span id="item-count" class="item-count"></span>
      </div>
      <div id="items-grid" class="items-grid"></div>
      <div id="empty-items" class="empty-items hidden">
        <p>No items in this category. Click "Add New Item" to create one.</p>
      </div>
    </main>
  </div>

  <!-- Add Item Modal -->
  <div id="modal-overlay" class="modal-overlay hidden" role="dialog" aria-modal="true" aria-labelledby="modal-title">
    <div class="modal">
      <div class="modal-header">
        <h3 id="modal-title">Add New Item</h3>
        <button type="button" class="modal-close" id="modal-close" aria-label="Close">&times;</button>
      </div>
      <form id="add-item-form" class="modal-body">
        <div class="form-row">
          <label class="form-label">Image</label>
          <div class="image-upload-area">
            <img id="modal-image-preview" src="assets/images/placeholder.svg" alt="Preview" class="modal-preview" loading="lazy">
            <input type="file" id="modal-image-input" accept="image/*" hidden>
            <button type="button" class="btn btn-secondary btn-sm" id="modal-upload-btn">Upload Image</button>
            <input type="text" id="modal-image-name" class="form-input" placeholder="filename.webp" readonly>
          </div>
        </div>
        <div class="form-row">
          <label class="form-label" for="modal-name">Name (Arabic)</label>
          <input type="text" id="modal-name" class="form-input" required>
        </div>
        <div class="form-row">
          <label class="form-label" for="modal-name-en">Name (English)</label>
          <input type="text" id="modal-name-en" class="form-input">
        </div>
        <div class="form-row">
          <label class="form-label" for="modal-description">Description</label>
          <textarea id="modal-description" class="form-input" rows="2"></textarea>
        </div>
        <div class="form-row">
          <label class="form-label">Price Type</label>
          <div class="price-type-toggle">
            <label><input type="radio" name="price-type" value="single" checked> Single Price</label>
            <label><input type="radio" name="price-type" value="multi"> Multi Size (L/M/S)</label>
          </div>
        </div>
        <div id="single-price-fields" class="form-row">
          <label class="form-label" for="modal-price">Price</label>
          <input type="text" id="modal-price" class="form-input price-input" inputmode="numeric" placeholder="120">
        </div>
        <div id="multi-price-fields" class="form-row hidden">
          <div class="multi-price-grid">
            <div>
              <label class="form-label" for="modal-price-l">Large (L)</label>
              <input type="text" id="modal-price-l" class="form-input price-input" inputmode="numeric">
            </div>
            <div>
              <label class="form-label" for="modal-price-m">Medium (M)</label>
              <input type="text" id="modal-price-m" class="form-input price-input" inputmode="numeric">
            </div>
            <div>
              <label class="form-label" for="modal-price-s">Small (S)</label>
              <input type="text" id="modal-price-s" class="form-input price-input" inputmode="numeric">
            </div>
          </div>
        </div>
        <div class="form-row">
          <label class="form-label" for="modal-category">Category</label>
          <select id="modal-category" class="form-input" required></select>
        </div>
        <div class="form-row form-check">
          <label><input type="checkbox" id="modal-available" checked> Available</label>
        </div>
        <div class="modal-footer">
          <button type="button" class="btn btn-ghost" id="modal-cancel">Cancel</button>
          <button type="submit" class="btn btn-primary">Save</button>
        </div>
      </form>
    </div>
  </div>

  <!-- Delete Confirmation -->
  <div id="confirm-overlay" class="modal-overlay hidden" role="alertdialog" aria-modal="true">
    <div class="modal modal-sm">
      <div class="modal-header">
        <h3>Confirm Delete</h3>
      </div>
      <div class="modal-body">
        <p id="confirm-message">Are you sure you want to delete this item?</p>
      </div>
      <div class="modal-footer">
        <button type="button" class="btn btn-ghost" id="confirm-cancel">Cancel</button>
        <button type="button" class="btn btn-danger" id="confirm-delete">Delete</button>
      </div>
    </div>
  </div>

  <input type="file" id="import-file-input" accept=".js,.json,text/javascript,application/json" hidden>

  <footer class="admin-footer">
    <img src="assets/logo/developer.svg" alt="AHMED MOURAD" width="32" height="32" loading="lazy">
    <span>Developed by <strong>AHMED MOURAD</strong></span>
  </footer>

  <script src="js/data.js"></script>
  <script src="js/storage.js"></script>
  <script src="js/import.js"></script>
  <script src="js/export.js"></script>
  <script src="js/admin.js"></script>
</body>
</html>
